name: Generate Pac-Man

on:
  schedule:
    - cron: "30 0 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate pac-man contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Push to main branch
        run: |
          cp dist/pacman-contribution-graph.svg assets/
          cp dist/pacman-contribution-graph-dark.svg assets/
          git config user.name "sqok"
          git config user.email "sqok@users.noreply.github.com"
          git add assets/pacman-contribution-graph.svg assets/pacman-contribution-graph-dark.svg
          git diff --staged --quiet || git commit -m "Update pac-man contribution graph"
          git push
